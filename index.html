<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt Vault – Free AI Prompts for Grok, ChatGPT, Claude & Midjourney</title>
  <meta name="description" content="Searchable collection of high-quality AI prompts. Copy-paste ready for writing, coding, art, business and more. 100% free & static.">
  
  <!-- Tailwind v4 Play CDN (for development/prototyping – fast & no build needed) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Optional: better copy icon & clipboard support -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-x..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',      // indigo-500
            primarydark: '#4f46e5',  // indigo-600
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 shadow sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <h1 class="text-2xl sm:text-3xl font-bold text-primary">Prompt Vault</h1>
      
      <div class="flex items-center gap-4">
        <input id="search" type="text" placeholder="Search prompts..." class="w-64 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary">
        
        <button id="toggleDark" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
          <i class="fas fa-moon text-xl"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="noResults" class="hidden text-center py-12 text-gray-500 dark:text-gray-400">
      No prompts found matching your search.
    </div>
    
    <div id="promptList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center text-sm text-gray-500 dark:text-gray-400">
      Built with ❤️ as a free static site • 
      <a href="https://github.com/YOUR_USERNAME/ai-prompt-vault" class="text-primary hover:underline">GitHub</a> • 
      Add your best prompts via PR!
    </div>
  </footer>

  <!-- Prompts data (expand this array as much as you want) -->
  <script>
    const prompts = [
      {
        category: "Writing",
        title: "Blog Post – Engaging Intro",
        text: "Write a 150-word blog post introduction that hooks the reader immediately. Topic: [TOPIC]. Use storytelling, a surprising fact, or a provocative question. Tone: conversational and energetic. End with a clear promise of what the reader will learn."
      },
      {
        category: "Coding",
        title: "Refactor messy function",
        text: "Refactor the following JavaScript function to be cleaner, more readable, and follow modern best practices (ES6+, single responsibility, better naming). Add comments explaining changes. Original:\n\n[PASTE CODE HERE]"
      },
      {
        category: "Art – Midjourney",
        title: "Cinematic sci-fi scene",
        text: "Cinematic wide shot of a neon-drenched cyberpunk city at rainy night, towering holographic billboards, flying cars, lone figure in trench coat looking up, dramatic lighting, volumetric fog, ultra detailed, 8k, --ar 16:9 --v 6 --stylize 750 --q 2"
      },
      {
        category: "Business",
        title: "Cold email opener",
        text: "Write a concise, non-spammy cold email subject line + first 3 sentences to [ROLE] at [COMPANY]. Goal: book a 10-min call about [VALUE PROP]. Tone: curious, respectful, value-first. Personalize with recent company news if possible."
      },
      {
        category: "Productivity",
        title: "Daily planning prompt",
        text: "Act as my productivity coach. Today is [DATE]. My top 3 goals are: 1. [GOAL1] 2. [GOAL2] 3. [GOAL3]. Suggest the ideal schedule blocks (using time-blocking), Pomodoro sessions if needed, and one micro-habit to build momentum. Keep me accountable with a short evening reflection question."
      }
      // ← Add 50–500+ more objects here (copy-paste friendly)
    ];

    // ────────────────────────────────────────────────
    // Render prompts
    const promptContainer = document.getElementById('promptList');
    const noResults = document.getElementById('noResults');
    const searchInput = document.getElementById('search');

    function renderPrompts(filtered = prompts) {
      promptContainer.innerHTML = '';
      if (filtered.length === 0) {
        noResults.classList.remove('hidden');
        return;
      }
      noResults.classList.add('hidden');

      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden border border-gray-200 dark:border-gray-700 hover:shadow-lg transition';
        card.innerHTML = `
          <div class="bg-gradient-to-r from-primary to-primarydark px-5 py-3 text-white font-medium">
            ${p.category} • ${p.title}
          </div>
          <div class="p-5">
            <p class="text-gray-700 dark:text-gray-300 mb-4 whitespace-pre-wrap">${p.text.replace(/\n/g, '<br>')}</p>
            <button class="copy-btn flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primarydark text-white rounded-lg transition w-full justify-center" data-text="${p.text.replace(/"/g, '&quot;')}">
              <i class="fas fa-copy"></i> Copy Prompt
            </button>
          </div>
        `;
        promptContainer.appendChild(card);
      });
    }

    // Initial render
    renderPrompts();

    // Search
    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = prompts.filter(p =>
        p.title.toLowerCase().includes(term) ||
        p.category.toLowerCase().includes(term) ||
        p.text.toLowerCase().includes(term)
      );
      renderPrompts(filtered);
    });

    // Copy functionality
    promptContainer.addEventListener('click', (e) => {
      if (e.target.closest('.copy-btn')) {
        const btn = e.target.closest('.copy-btn');
        const text = btn.dataset.text;
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
          btn.classList.add('bg-green-600', 'hover:bg-green-700');
          setTimeout(() => {
            btn.innerHTML = orig;
            btn.classList.remove('bg-green-600', 'hover:bg-green-700');
          }, 2000);
        });
      }
    });

    // Dark mode toggle
    const toggleBtn = document.getElementById('toggleDark');
    const html = document.documentElement;

    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
      toggleBtn.innerHTML = '<i class="fas fa-sun text-xl"></i>';
    }

    toggleBtn.addEventListener('click', () => {
      html.classList.toggle('dark');
      if (html.classList.contains('dark')) {
        localStorage.theme = 'dark';
        toggleBtn.innerHTML = '<i class="fas fa-sun text-xl"></i>';
      } else {
        localStorage.theme = 'light';
        toggleBtn.innerHTML = '<i class="fas fa-moon text-xl"></i>';
      }
    });
  </script>
</body>
</html>
