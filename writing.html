<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Writing Prompts – Prompt Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#6366f1'}}}}</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

  <header class="bg-white dark:bg-gray-800 shadow sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-primary"><a href="index.html">Prompt Vault</a> → Writing</h1>
      <button id="toggleDark" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700">
        <i class="fas fa-moon text-xl"></i>
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="promptList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <footer class="bg-white dark:bg-gray-800 py-6 text-center text-sm text-gray-500 dark:text-gray-400">
    Back to <a href="index.html" class="text-primary hover:underline">All Prompts</a>
  </footer>

  <script src="prompts-data.js"></script>
  <script>
    const container = document.getElementById('promptList');
    const writingPrompts = allPrompts.filter(p => p.category === 'Writing'); // ← change per page

    writingPrompts.forEach(p => {
      const card = document.createElement('div');
      card.className = 'bg-white dark:bg-gray-800 rounded-xl shadow border dark:border-gray-700 p-5';
      card.innerHTML = `
        <h3 class="font-bold text-lg mb-2">${p.title}</h3>
        <p class="text-gray-700 dark:text-gray-300 mb-4 whitespace-pre-wrap">${p.text.replace(/\n/g,'<br>')}</p>
        <button class="copy-btn w-full py-2 bg-primary text-white rounded-lg flex items-center justify-center gap-2" data-text="${p.text.replace(/"/g,'&quot;')}">
          <i class="fas fa-copy"></i> Copy
        </button>
      `;
      container.appendChild(card);
    });

    container.addEventListener('click', e => {
      const btn = e.target.closest('.copy-btn');
      if (btn) {
        navigator.clipboard.writeText(btn.dataset.text).then(() => {
          btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
          setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> Copy', 1800);
        });
      }
    });

    // Dark mode (copy from index.html)
    const toggle = document.getElementById('toggleDark');
    if (localStorage.theme === 'dark' || ... ) { /* same as index */ }
    toggle.addEventListener('click', () => { /* same */ });
  </script>
</body>
</html>
